<!DOCTYPE html>
<html>
  <head>
    <title>PR Description Filler Settings</title>
    <style>
      body {
        width: 300px;
        padding: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .reviewer-fields {
        margin-bottom: 8px;
      }
      .reviewer-field {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .reviewer-field input[type="text"] {
        flex: 1;
      }
      .status {
        margin-top: 8px;
        display: none;
        color: #1a7f37;
      }
      .btn {
        border-radius: 6px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 600;
        border: 1px solid;
      }
      .btn-filled-success {
        background-color: #2e7d32;
        border-color: rgba(27, 31, 36, 0.15);
        color: white;
      }
      .btn-filled-success:hover {
        background-color: #1b5e20;
      }
      .btn-outlined-success {
        background-color: transparent;
        border-color: #2e7d32;
        color: #2e7d32;
      }
      .btn-outlined-success:hover {
        background-color: rgba(46, 125, 50, 0.04);
      }
      .btn-filled-error {
        background-color: #d32f2f;
        border-color: rgba(27, 31, 36, 0.15);
        color: white;
        padding: 8px;
        min-width: 32px;
      }
      .btn-filled-error:hover {
        background-color: #c62828;
      }
      .btn-full-width {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="form-group">
      <label for="issueBaseUrl">Issue Base URL:</label>
      <input
        type="text"
        id="issueBaseUrl"
        placeholder="https://yourdomain.atlassian.net/browse/"
      />
    </div>
    <div class="form-group">
      <label>Reviewers:</label>
      <div id="reviewer-fields" class="reviewer-fields"></div>
      <button
        type="button"
        id="add-reviewer"
        class="btn btn-outlined-success btn-full-width"
      >
        +
      </button>
    </div>
    <hr style="margin: 16px 0; border: none; border-top: 1px solid #d0d7de" />
    <button id="save" class="btn btn-filled-success btn-full-width">
      Save Settings
    </button>
    <div id="status" class="status">Settings saved!</div>
    <script src="popup.js"></script>
  </body>
</html>
